<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
<title>Karnala Chandhana — Professional Highlights</title>
<defs>
  <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glowStrong" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="7" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softBlur" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="26"/>
  </filter>

  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0F0B14"/>
    <stop offset="50%" stop-color="#0B0B0F"/>
    <stop offset="100%" stop-color="#120B18"/>
  </linearGradient>

  <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#FF4FD8"/>
    <stop offset="50%" stop-color="#8B5CF6"/>
    <stop offset="100%" stop-color="#C084FC"/>
  </linearGradient>

  <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#FF4FD8"/>
    <stop offset="50%" stop-color="#8B5CF6"/>
    <stop offset="100%" stop-color="#C084FC"/>
  </linearGradient>

  <linearGradient id="valueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#FF4FD8"/>
    <stop offset="100%" stop-color="#C084FC"/>
  </linearGradient>

  <radialGradient id="orbPink" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FF4FD8" stop-opacity="0.30"/>
    <stop offset="100%" stop-color="#FF4FD8" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="orbPurple" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
  </radialGradient>

  <linearGradient id="scannerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#FF4FD8" stop-opacity="0"/>
    <stop offset="50%" stop-color="#C084FC" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
  </linearGradient>

  <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
    <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0"/>
    <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.22"/>
    <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0"/>
    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
  </linearGradient>

  <pattern id="gridPattern" width="34" height="34" patternUnits="userSpaceOnUse">
    <path d="M34,0 L0,0 0,34" fill="none" stroke="#8B5CF6" stroke-width="0.5" opacity="0.10"/>
  </pattern>

  <clipPath id="cardClip">
    <rect x="20" y="20" width="860" height="380" rx="24"/>
  </clipPath>
</defs>

<style>
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .card-root { animation: fadeIn 1s ease-out both; }

  @keyframes borderPulse { 0%,100% { opacity:0.55; } 50% { opacity:1; } }
  .border-pulse { animation: borderPulse 3.6s ease-in-out infinite; }

  @keyframes orbPulse { 0%,100% { opacity:0.5; transform:scale(1); } 50% { opacity:0.85; transform:scale(1.1); } }
  .orb { animation: orbPulse 5s ease-in-out infinite; transform-origin: center; }

  @keyframes riseFade { 0% { opacity:0; transform:translateY(0); } 12% { opacity:0.9; } 88% { opacity:0.4; } 100% { opacity:0; transform:translateY(-360px); } }
  .particle { animation-name: riseFade; animation-timing-function: linear; animation-iteration-count: infinite; }

  @keyframes dividerGlow { 0%,100% { opacity:0.25; } 50% { opacity:0.6; } }
  .divider { animation: dividerGlow 3s ease-in-out infinite; }

  text { font-family: 'Segoe UI', Arial, sans-serif; }
</style>

<g class="card-root">
  <!-- ===== Card base ===== -->
  <rect x="20" y="20" width="860" height="380" rx="24" fill="url(#bgGrad)"/>
  <rect x="20" y="20" width="860" height="380" rx="24" fill="url(#gridPattern)" clip-path="url(#cardClip)"/>

  <!-- ambient orbs, clipped to card -->
  <g clip-path="url(#cardClip)">
    <circle class="orb" cx="120" cy="380" r="110" fill="url(#orbPink)" filter="url(#softBlur)" style="animation-delay:0s;"/>
    <circle class="orb" cx="800" cy="60" r="120" fill="url(#orbPurple)" filter="url(#softBlur)" style="animation-delay:1.4s;"/>
    <circle class="orb" cx="450" cy="400" r="100" fill="url(#orbPink)" filter="url(#softBlur)" style="animation-delay:2.3s;"/>
  </g>

  <!-- glowing border -->
  <rect class="border-pulse" x="20" y="20" width="860" height="380" rx="24" fill="none" stroke="url(#borderGrad)" stroke-width="2" filter="url(#glowStrong)"/>
  <rect x="20" y="20" width="860" height="380" rx="24" fill="none" stroke="#8B5CF6" stroke-opacity="0.3" stroke-width="1"/>

  <!-- corner accents -->
  <g stroke="#FF4FD8" stroke-width="2" opacity="0.65" fill="none">
    <path d="M36,58 L36,36 L58,36"/>
    <path d="M842,36 L864,36 L864,58"/>
  </g>
  <g stroke="#8B5CF6" stroke-width="2" opacity="0.65" fill="none">
    <path d="M36,382 L36,404 L58,404"/>
    <path d="M842,404 L864,404 L864,382"/>
  </g>

  <!-- holographic occasional shine -->
  <g clip-path="url(#cardClip)">
    <rect x="-260" y="20" width="220" height="380" fill="url(#shineGrad)" transform="skewX(-20)">
      <animate attributeName="x" keyTimes="0;0.55;1" values="-260;1000;1000" dur="7s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- continuous vertical scanner line -->
  <g clip-path="url(#cardClip)">
    <rect x="20" y="20" width="860" height="4" fill="url(#scannerGrad)" filter="url(#glow)" opacity="0.85">
      <animate attributeName="y" values="20;396;20" dur="4.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ===== Title ===== -->
  <text x="450" y="70" text-anchor="middle" font-size="27" font-weight="800" fill="url(#titleGrad)" filter="url(#glow)">Professional Highlights</text>
  <line x1="330" y1="86" x2="570" y2="86" stroke="url(#borderGrad)" stroke-width="1.4" opacity="0.6"/>

  <!-- ===== Column dividers ===== -->
  <line class="divider" x1="450" y1="120" x2="450" y2="380" stroke="#C084FC" stroke-width="1.2"/>

  <!-- ================= COLUMN 1 ================= -->
  <g font-size="16">
    <!-- Row 1 -->
    <text x="60" y="158" font-size="22">💼</text>
    <text x="94" y="156" font-size="15.5" fill="#E5E7EB" fill-opacity="0.92">Projects Completed</text>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.6s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="18,0" to="0,0" begin="0.3s" dur="0.6s" fill="freeze"/>
      <text x="410" y="156" text-anchor="end" font-size="19" font-weight="800" fill="url(#valueGrad)">25+</text>
    </g>
    <line class="divider" x1="55" y1="176" x2="415" y2="176" stroke="#8B5CF6" stroke-width="1"/>

    <!-- Row 2 -->
    <text x="60" y="228" font-size="22">🌐</text>
    <text x="94" y="226" font-size="15.5" fill="#E5E7EB" fill-opacity="0.92">Websites Developed</text>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.6s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="18,0" to="0,0" begin="0.5s" dur="0.6s" fill="freeze"/>
      <text x="410" y="226" text-anchor="end" font-size="19" font-weight="800" fill="url(#valueGrad)">10+</text>
    </g>
    <line class="divider" x1="55" y1="246" x2="415" y2="246" stroke="#8B5CF6" stroke-width="1"/>

    <!-- Row 3 -->
    <text x="60" y="298" font-size="22">📈</text>
    <text x="94" y="296" font-size="15.5" fill="#E5E7EB" fill-opacity="0.92">SEO Projects</text>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.6s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="18,0" to="0,0" begin="0.7s" dur="0.6s" fill="freeze"/>
      <text x="410" y="296" text-anchor="end" font-size="19" font-weight="800" fill="url(#valueGrad)">5+</text>
    </g>
  </g>

  <!-- ================= COLUMN 2 ================= -->
  <g font-size="16">
    <!-- Row 1 -->
    <text x="490" y="158" font-size="22">📢</text>
    <text x="524" y="156" font-size="15.5" fill="#E5E7EB" fill-opacity="0.92">Google &amp; Meta Ad Campaigns</text>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.6s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="18,0" to="0,0" begin="0.4s" dur="0.6s" fill="freeze"/>
      <text x="840" y="156" text-anchor="end" font-size="19" font-weight="800" fill="url(#valueGrad)">20+</text>
    </g>
    <line class="divider" x1="485" y1="176" x2="845" y2="176" stroke="#8B5CF6" stroke-width="1"/>

    <!-- Row 2 -->
    <text x="490" y="228" font-size="22">🤝</text>
    <text x="524" y="226" font-size="15.5" fill="#E5E7EB" fill-opacity="0.92">Freelance Clients</text>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.6s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="18,0" to="0,0" begin="0.6s" dur="0.6s" fill="freeze"/>
      <text x="840" y="226" text-anchor="end" font-size="19" font-weight="800" fill="url(#valueGrad)">15+</text>
    </g>
    <line class="divider" x1="485" y1="246" x2="845" y2="246" stroke="#8B5CF6" stroke-width="1"/>

    <!-- Row 3 -->
    <text x="490" y="298" font-size="22">🏆</text>
    <text x="524" y="296" font-size="15.5" fill="#E5E7EB" fill-opacity="0.92">Google Certifications</text>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.6s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="18,0" to="0,0" begin="0.8s" dur="0.6s" fill="freeze"/>
      <text x="840" y="296" text-anchor="end" font-size="19" font-weight="800" fill="url(#valueGrad)">10</text>
    </g>
  </g>

  <!-- ===== Footer ===== -->
  <line x1="60" y1="356" x2="840" y2="356" stroke="#8B5CF6" stroke-opacity="0.25" stroke-width="1"/>
  <text x="450" y="380" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#C084FC" opacity="0.75">Karnala Chandhana &#8226; WordPress Developer &amp; Digital Marketing Executive</text>

  <!-- ===== Floating particles ===== -->
  <g clip-path="url(#cardClip)">
    <circle class="particle" cx="283" cy="377" r="2.2" fill="#C084FC" style="animation-delay:3.27s; animation-duration:6.48s;"/>
    <circle class="particle" cx="525" cy="380" r="1.8" fill="#C084FC" style="animation-delay:3.49s; animation-duration:7.42s;"/>
    <circle class="particle" cx="305" cy="375" r="1.8" fill="#C084FC" style="animation-delay:1.41s; animation-duration:8.98s;"/>
    <circle class="particle" cx="593" cy="393" r="1.3" fill="#C084FC" style="animation-delay:3.3s; animation-duration:6.59s;"/>
    <circle class="particle" cx="277" cy="380" r="1.8" fill="#C084FC" style="animation-delay:0.91s; animation-duration:8.7s;"/>
    <circle class="particle" cx="799" cy="340" r="2.2" fill="#C084FC" style="animation-delay:4.03s; animation-duration:5.26s;"/>
    <circle class="particle" cx="83" cy="359" r="1.8" fill="#C084FC" style="animation-delay:4.68s; animation-duration:8.29s;"/>
    <circle class="particle" cx="524" cy="378" r="2.2" fill="#C084FC" style="animation-delay:4.31s; animation-duration:8.52s;"/>
    <circle class="particle" cx="847" cy="398" r="2.2" fill="#C084FC" style="animation-delay:2.56s; animation-duration:7.91s;"/>
    <circle class="particle" cx="495" cy="399" r="1.3" fill="#C084FC" style="animation-delay:0.8s; animation-duration:6.46s;"/>
    <circle class="particle" cx="179" cy="371" r="1.8" fill="#C084FC" style="animation-delay:1.3s; animation-duration:8.86s;"/>
    <circle class="particle" cx="837" cy="380" r="1.8" fill="#C084FC" style="animation-delay:5.13s; animation-duration:6.68s;"/>
    <circle class="particle" cx="627" cy="362" r="1.3" fill="#C084FC" style="animation-delay:3.2s; animation-duration:6.63s;"/>
    <circle class="particle" cx="384" cy="383" r="1.8" fill="#C084FC" style="animation-delay:5.49s; animation-duration:5.11s;"/>
  </g>
</g>
</svg>