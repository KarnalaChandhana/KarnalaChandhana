<svg width="900" height="860" viewBox="0 0 900 860" xmlns="http://www.w3.org/2000/svg">
  <title>Karnala Chandhana — Professional Skills</title>
  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBlur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0B14"/>
      <stop offset="50%" stop-color="#0B0B0F"/>
      <stop offset="100%" stop-color="#120B18"/>
    </linearGradient>

    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4FD8"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>

    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4FD8"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>

    <radialGradient id="orbPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF4FD8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#FF4FD8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="scannerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4FD8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C084FC" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <pattern id="gridPattern" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34,0 L0,0 0,34" fill="none" stroke="#8B5CF6" stroke-width="0.5" opacity="0.10"/>
    </pattern>

    <clipPath id="cardClip">
      <rect x="20" y="20" width="860" height="820" rx="24"/>
    </clipPath>

    <!-- Progress bar gradients -->
    <linearGradient id="pb1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4FC3F7"/><stop offset="100%" stop-color="#4FC3F7"/>
    </linearGradient>
    <linearGradient id="pb2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA"/><stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="pb3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34D399"/><stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="pb4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA"/><stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="pb5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F472B6"/><stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="pb6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FB923C"/><stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <linearGradient id="pb7" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FBBF24"/><stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="pb8" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B35"/><stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="pb9" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD43B"/><stop offset="100%" stop-color="#FFD43B"/>
    </linearGradient>
    <linearGradient id="pb10" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C084FC"/><stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="pb11" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F87171"/><stop offset="100%" stop-color="#F87171"/>
    </linearGradient>
    <linearGradient id="pb12" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/><stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>

    <!-- Progress bar backgrounds -->
    <linearGradient id="pbBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .card-root { animation: fadeIn 1s ease-out both; }

    @keyframes borderPulse { 0%,100% { opacity:0.55; } 50% { opacity:1; } }
    .border-pulse { animation: borderPulse 3.6s ease-in-out infinite; }

    @keyframes orbPulse { 0%,100% { opacity:0.5; transform:scale(1); } 50% { opacity:0.85; transform:scale(1.1); } }
    .orb { animation: orbPulse 5s ease-in-out infinite; transform-origin: center; }

    @keyframes riseFade { 0% { opacity:0; transform:translateY(0); } 12% { opacity:0.9; } 88% { opacity:0.4; } 100% { opacity:0; transform:translateY(-420px); } }
    .particle { animation-name: riseFade; animation-timing-function: linear; animation-iteration-count: infinite; }

    @keyframes barGrow { from { width:0%; } to { width:100%; } }
    .bar-grow { animation: barGrow 1.2s ease-out both; }

    @keyframes skillFade { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    .skill-item { animation: skillFade 0.5s ease-out both; }

    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>

  <g class="card-root">
    <!-- ===== Card base ===== -->
    <rect x="20" y="20" width="860" height="820" rx="24" fill="url(#bgGrad)"/>
    <rect x="20" y="20" width="860" height="820" rx="24" fill="url(#gridPattern)" clip-path="url(#cardClip)"/>

    <!-- ambient orbs -->
    <g clip-path="url(#cardClip)">
      <circle class="orb" cx="100" cy="800" r="150" fill="url(#orbPink)" filter="url(#softBlur)" style="animation-delay:0s;"/>
      <circle class="orb" cx="810" cy="100" r="160" fill="url(#orbPurple)" filter="url(#softBlur)" style="animation-delay:1.4s;"/>
      <circle class="orb" cx="450" cy="820" r="140" fill="url(#orbPink)" filter="url(#softBlur)" style="animation-delay:2.3s;"/>
    </g>

    <!-- glowing border -->
    <rect class="border-pulse" x="20" y="20" width="860" height="820" rx="24" fill="none" stroke="url(#borderGrad)" stroke-width="2" filter="url(#glowStrong)"/>
    <rect x="20" y="20" width="860" height="820" rx="24" fill="none" stroke="#8B5CF6" stroke-opacity="0.3" stroke-width="1"/>

    <!-- corner accents -->
    <g stroke="#FF4FD8" stroke-width="2" opacity="0.65" fill="none">
      <path d="M36,58 L36,36 L58,36"/>
      <path d="M842,36 L864,36 L864,58"/>
    </g>
    <g stroke="#8B5CF6" stroke-width="2" opacity="0.65" fill="none">
      <path d="M36,822 L36,844 L58,844"/>
      <path d="M842,844 L864,844 L864,822"/>
    </g>

    <!-- holographic occasional shine -->
    <g clip-path="url(#cardClip)">
      <rect x="-260" y="20" width="220" height="820" fill="url(#shineGrad)" transform="skewX(-20)">
        <animate attributeName="x" keyTimes="0;0.55;1" values="-260;1000;1000" dur="7s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- continuous vertical scanner line -->
    <g clip-path="url(#cardClip)">
      <rect x="20" y="20" width="860" height="4" fill="url(#scannerGrad)" filter="url(#glow)" opacity="0.85">
        <animate attributeName="y" values="20;836;20" dur="4.2s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- ===== Title ===== -->
    <text x="450" y="58" text-anchor="middle" font-size="27" font-weight="800" fill="url(#titleGrad)" filter="url(#glow)">Professional Skills</text>
    <text x="450" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#C084FC" opacity="0.9">Digital Marketing &#8226; Performance Marketing &#8226; Web Development</text>
    <line x1="300" y1="96" x2="600" y2="96" stroke="url(#borderGrad)" stroke-width="1.4" opacity="0.6"/>

    <!-- ===== Skill Items - Vertical Layout ===== -->

    <!-- Skill 1: WordPress Development - 95% -->
    <g class="skill-item" style="animation-delay:0.05s;">
      <text x="50" y="148" font-size="16" font-weight="600" fill="#4FC3F7">⚙️ WordPress Development</text>
      <rect x="50" y="160" width="660" height="8" rx="4" fill="url(#pbBg)"/>
      <rect x="50" y="160" width="627" height="8" rx="4" fill="url(#pb1)" filter="url(#glow)" opacity="0.9">
        <animate attributeName="width" from="0" to="627" dur="1s" fill="freeze"/>
      </rect>
      <text x="730" y="168" font-size="13" font-weight="700" fill="#4FC3F7" text-anchor="end">95%</text>
    </g>

    <!-- Skill 2: SEO - 85% -->
    <g class="skill-item" style="animation-delay:0.10s;">
      <text x="50" y="210" font-size="16" font-weight="600" fill="#A78BFA">🔍 SEO</text>
      <rect x="50" y="222" width="660" height="8" rx="4" fill="url(#pbBg)"/>
      <rect x="50" y="222" width="561" height="8" rx="4" fill="url(#pb2)" filter="url(#glow)" opacity="0.9">
        <animate attributeName="width" from="0" to="561" dur="1s" fill="freeze"/>
      </rect>
      <text x="730" y="230" font-size="13" font-weight="700" fill="#A78BFA" text-anchor="end">85%</text>
    </g>

    <!-- Skill 3: Google Ads - 90% -->
    <g class="skill-item" style="animation-delay:0.15s;">
      <text x="50" y="272" font-size="16" font-weight="600" fill="#34D399">📢 Google Ads</text>
      <rect x="50" y="284" width="660" height="8" rx="4" fill="url(#pbBg)"/>
      <rect x="50" y="284" width="594" height="8" rx="4" fill="url(#pb3)" filter="url(#glow)" opacity="0.9">
        <animate attributeName="width" from="0" to="594" dur="1s" fill="freeze"/>
      </rect>
      <text x="730" y="292" font-size="13" font-weight="700" fill="#34D399" text-anchor="end">90%</text>
    </g>

    <!-- Skill 4: Meta Ads - 88% -->
    <g class="skill-item" style="animation-delay:0.20s;">
      <text x="50" y="334" font-size="16" font-weight="600" fill="#60A5FA">📱 Meta Ads</text>
      <rect x="50" y="346" width="660" height="8" rx="4" fill="url(#pbBg)"/>
      <rect x="50" y="346" width="581" height="8" rx="4" fill="url(#pb4)" filter="url(#glow)" opacity="0.9">
        <animate attributeName="width" from="0" to="581" dur="1s" fill="freeze"/>
      </rect>
      <text x="730" y="354" font-size="13" font-weight="700" fill="#60A5FA" text-anchor="end">88%</text>
    </g>

    <!-- Skill 5: Digital Marketing - 94% -->
    <g class="skill-item" style="animation-delay:0.25s;">
      <text x="50" y="396" font-size="16" font-weight="600" fill="#F472B6">📈 Digital Marketing</text>
      <rect x="50" y="408" width="660" height="8" rx="4" fill="url(#pbBg)"/>
      <rect x="50" y="408" width="620" height="8" rx="4" fill="url(#pb5)" filter="url(#glow)" opacity="0.9">
        <animate attributeName="width" from="0" to="620" dur="1s" fill="freeze"/>
      </rect>
      <text x="730" y="416" font-size="13" font-weight="700" fill="#F472B6" text-anchor="end">94%</text>
    </g>

    <!-- Skill 6: Social Media Marketing - 90% -->
    <g class="skill-item" style="animation-delay:0.30s;">
      <text x="50" y="458" font-size="16" font-weight="600" fill="#FB923C">🎯 Social Media Marketing</text>
      <rect x="50" y="470" width="660" height="8" rx="4" fill="url(#pbBg)"/>
      <rect x="50" y="470" width="594" height="8" rx="4" fill="url(#pb6)" filter="url(#glow)" opacity="0.9">
        <animate attributeName="width" from="0" to="594" dur="1s" fill="freeze"/>
      </rect>
      <text x="730" y="478" font-size="13" font-weight="700" fill="#FB923C" text-anchor="end">90%</text>
    </g>

    <!-- Skill 7: Google Analytics - 85% -->
    <g class="skill-item" style="animation-delay:0.35s;">
      <text x="50" y="520" font-size="16" font-weight="600" fill="#FBBF24">📊 Google Analytics</text>
      <rect x="50" y="532" width="660" height="8" rx="4" fill="url(#pbBg)"/>
      <rect x="50" y="532" width="561" height="8" rx="4" fill="url(#pb7)" filter="url(#glow)" opacity="0.9">
        <animate attributeName="width" from="0" to="561" dur="1s" fill="freeze"/>
      </rect>
      <text x="730" y="540" font-size="13" font-weight="700" fill="#FBBF24" text-anchor="end">85%</text>
    </g>

    <!-- Skill 8: HTML & CSS - 85% -->
    <g class="skill-item" style="animation-delay:0.40s;">
      <text x="50" y="582" font-size="16" font-weight="600" fill="#FF6B35">💻 HTML &amp; CSS</text>
      <rect x="50" y="594" width="660" height="8" rx="4" fill="url(#pbBg)"/>
      <rect x="50" y="594" width="561" height="8" rx="4" fill="url(#pb8)" filter="url(#glow)" opacity="0.9">
        <animate attributeName="width" from="0" to="561" dur="1s" fill="freeze"/>
      </rect>
      <text x="730" y="602" font-size="13" font-weight="700" fill="#FF6B35" text-anchor="end">85%</text>
    </g>

    <!-- Skill 9: Python - 75% -->
    <g class="skill-item" style="animation-delay:0.45s;">
      <text x="50" y="644" font-size="16" font-weight="600" fill="#FFD43B">🐍 Python</text>
      <rect x="50" y="656" width="660" height="8" rx="4" fill="url(#pbBg)"/>
      <rect x="50" y="656" width="495" height="8" rx="4" fill="url(#pb9)" filter="url(#glow)" opacity="0.9">
        <animate attributeName="width" from="0" to="495" dur="1s" fill="freeze"/>
      </rect>
      <text x="730" y="664" font-size="13" font-weight="700" fill="#FFD43B" text-anchor="end">75%</text>
    </g>

    <!-- Skill 10: Canva & Creative Design - 90% -->
    <g class="skill-item" style="animation-delay:0.50s;">
      <text x="50" y="706" font-size="16" font-weight="600" fill="#C084FC">🎨 Canva &amp; Creative Design</text>
      <rect x="50" y="718" width="660" height="8" rx="4" fill="url(#pbBg)"/>
      <rect x="50" y="718" width="594" height="8" rx="4" fill="url(#pb10)" filter="url(#glow)" opacity="0.9">
        <animate attributeName="width" from="0" to="594" dur="1s" fill="freeze"/>
      </rect>
      <text x="730" y="726" font-size="13" font-weight="700" fill="#C084FC" text-anchor="end">90%</text>
    </g>

    <!-- Skill 11: Video Editing - 80% -->
    <g class="skill-item" style="animation-delay:0.55s;">
      <text x="50" y="748" font-size="16" font-weight="600" fill="#F87171">🎬 Video Editing</text>
      <rect x="50" y="760" width="660" height="8" rx="4" fill="url(#pbBg)"/>
      <rect x="50" y="760" width="528" height="8" rx="4" fill="url(#pb11)" filter="url(#glow)" opacity="0.9">
        <animate attributeName="width" from="0" to="528" dur="1s" fill="freeze"/>
      </rect>
      <text x="730" y="768" font-size="13" font-weight="700" fill="#F87171" text-anchor="end">80%</text>
    </g>

    <!-- Skill 12: AI Video Creation - 92% -->
    <g class="skill-item" style="animation-delay:0.60s;">
      <text x="50" y="790" font-size="16" font-weight="600" fill="#38BDF8">🤖 AI Video Creation</text>
      <rect x="50" y="802" width="660" height="8" rx="4" fill="url(#pbBg)"/>
      <rect x="50" y="802" width="607" height="8" rx="4" fill="url(#pb12)" filter="url(#glow)" opacity="0.9">
        <animate attributeName="width" from="0" to="607" dur="1s" fill="freeze"/>
      </rect>
      <text x="730" y="810" font-size="13" font-weight="700" fill="#38BDF8" text-anchor="end">92%</text>
    </g>

    <!-- ===== Floating particles ===== -->
    <g clip-path="url(#cardClip)">
      <circle class="particle" cx="208" cy="813" r="1.8" fill="#C084FC" style="animation-delay:4.14s; animation-duration:7.54s;"/>
      <circle class="particle" cx="261" cy="825" r="1.3" fill="#C084FC" style="animation-delay:2.85s; animation-duration:8.85s;"/>
      <circle class="particle" cx="557" cy="816" r="1.8" fill="#C084FC" style="animation-delay:1.42s; animation-duration:5.01s;"/>
      <circle class="particle" cx="639" cy="813" r="1.3" fill="#C084FC" style="animation-delay:0.42s; animation-duration:8.18s;"/>
      <circle class="particle" cx="278" cy="822" r="2.2" fill="#C084FC" style="animation-delay:0.25s; animation-duration:8.99s;"/>
      <circle class="particle" cx="829" cy="828" r="1.8" fill="#C084FC" style="animation-delay:2.44s; animation-duration:6.77s;"/>
      <circle class="particle" cx="593" cy="815" r="1.8" fill="#C084FC" style="animation-delay:4.16s; animation-duration:7.6s;"/>
      <circle class="particle" cx="63" cy="804" r="1.3" fill="#C084FC" style="animation-delay:4.45s; animation-duration:5.35s;"/>
      <circle class="particle" cx="504" cy="805" r="1.8" fill="#C084FC" style="animation-delay:3.31s; animation-duration:6.37s;"/>
      <circle class="particle" cx="194" cy="805" r="1.3" fill="#C084FC" style="animation-delay:3.99s; animation-duration:6.88s;"/>
      <circle class="particle" cx="116" cy="824" r="2.2" fill="#C084FC" style="animation-delay:1.18s; animation-duration:7.7s;"/>
      <circle class="particle" cx="812" cy="830" r="2.2" fill="#C084FC" style="animation-delay:4.58s; animation-duration:7.32s;"/>
      <circle class="particle" cx="112" cy="803" r="1.8" fill="#C084FC" style="animation-delay:3.36s; animation-duration:7.24s;"/>
      <circle class="particle" cx="245" cy="810" r="1.8" fill="#C084FC" style="animation-delay:5.54s; animation-duration:8.55s;"/>
    </g>
  </g>
</svg>